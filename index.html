<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Recognition NLP App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .subtitle { font-size: 1.1em; opacity: 0.9; }
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card h2 { color: #667eea; margin-bottom: 15px; font-size: 1.5em; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover:not(:disabled) { background: #5568d3; transform: translateY(-2px); }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: 500; }
        .status.listening { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .status.idle { background: #f8f9fa; color: #6c757d; border: 2px solid #dee2e6; }
        .transcript-box {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .interim { color: #95a5a6; font-style: italic; }
        .mic-animation {
            width: 60px;
            height: 60px;
            margin: 10px auto;
            border-radius: 50%;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
        }
        .mic-animation.active { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7); }
            50% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(102, 126, 234, 0); }
        }
        .language-select {
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #dee2e6;
            font-size: 16px;
            margin-bottom: 15px;
            width: 100%;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 2em; font-weight: 700; color: #667eea; }
        .stat-label { color: #6c757d; font-size: 0.9em; margin-top: 5px; }
        .sentiment { padding: 15px; border-radius: 8px; text-align: center; font-weight: 600; font-size: 1.1em; }
        .sentiment.positive { background: #d4edda; color: #155724; }
        .sentiment.negative { background: #f8d7da; color: #721c24; }
        .sentiment.neutral { background: #fff3cd; color: #856404; }
        .tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            margin: 5px 5px 5px 0;
            font-size: 0.9em;
        }
        .tag.person { background: #e3f2fd; color: #1976d2; }
        .tag.place { background: #f3e5f5; color: #7b1fa2; }
        .tag.organization { background: #fff3e0; color: #e65100; }
        .tag.keyword { background: #e8f5e9; color: #2e7d32; }
        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
            h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎤 Speech Recognition NLP</h1>
            <p class="subtitle">Speak naturally - AI will analyze your speech in real-time</p>
        </header>

        <div class="main-content">
            <div class="card">
                <h2>Speech Input</h2>
                
                <div class="mic-animation" id="micAnimation">🎤</div>
                <div class="status idle" id="status">Ready to listen</div>

                <select class="language-select" id="languageSelect">
                    <option value="en-US">English (US)</option>
                    <option value="en-GB">English (UK)</option>
                    <option value="es-ES">Spanish</option>
                    <option value="fr-FR">French</option>
                    <option value="de-DE">German</option>
                    <option value="it-IT">Italian</option>
                    <option value="pt-BR">Portuguese (Brazil)</option>
                    <option value="ja-JP">Japanese</option>
                    <option value="ko-KR">Korean</option>
                    <option value="zh-CN">Chinese (Mandarin)</option>
                </select>

                <div class="controls">
                    <button class="btn-primary" id="startBtn">Start Listening</button>
                    <button class="btn-danger" id="stopBtn" disabled>Stop</button>
                    <button class="btn-secondary" id="clearBtn">Clear All</button>
                </div>

                <div class="transcript-box" id="transcript">
                    <p style="color: #95a5a6;">Your speech will appear here...</p>
                </div>

                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="wordCount">0</div>
                        <div class="stat-label">Words</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="sentenceCount">0</div>
                        <div class="stat-label">Sentences</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>NLP Analysis</h2>

                <div style="margin-bottom: 20px;">
                    <h3 style="color: #764ba2; font-size: 1.2em; margin-bottom: 10px;">Sentiment</h3>
                    <div class="sentiment neutral" id="sentiment">Neutral</div>
                </div>

                <div style="margin-bottom: 20px;">
                    <h3 style="color: #764ba2; font-size: 1.2em; margin-bottom: 10px;">Named Entities</h3>
                    <div id="entities">
                        <p style="color: #95a5a6;">No entities detected yet</p>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <h3 style="color: #764ba2; font-size: 1.2em; margin-bottom: 10px;">Keywords</h3>
                    <div id="keywords">
                        <p style="color: #95a5a6;">No keywords extracted yet</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert('Speech Recognition not supported. Please use Chrome, Edge, or Safari.');
        }

        let recognition = null;
        let finalTranscript = '';
        let isListening = false;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const clearBtn = document.getElementById('clearBtn');
        const status = document.getElementById('status');
        const transcript = document.getElementById('transcript');
        const micAnimation = document.getElementById('micAnimation');
        const languageSelect = document.getElementById('languageSelect');

        function initRecognition() {
            if (recognition) return;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = languageSelect.value;

            recognition.onstart = () => {
                status.textContent = '🎙️ Listening...';
                status.className = 'status listening';
                micAnimation.classList.add('active');
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcriptPiece = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcriptPiece + ' ';
                    } else {
                        interimTranscript += transcriptPiece;
                    }
                }
                displayTranscript(finalTranscript, interimTranscript);
                analyzeText(finalTranscript);
            };

            recognition.onerror = (event) => {
                console.error('Error:', event.error);
                status.textContent = 'Error: ' + event.error;
                status.className = 'status idle';
                micAnimation.classList.remove('active');
                startBtn.disabled = false;
                stopBtn.disabled = true;
            };

            recognition.onend = () => {
                if (isListening) {
                    try { recognition.start(); } catch(e) {}
                }
            };
        }

        startBtn.addEventListener('click', () => {
            initRecognition();
            recognition.start();
            isListening = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
        });

        stopBtn.addEventListener('click', () => {
            isListening = false;
            recognition.stop();
            startBtn.disabled = false;
            stopBtn.disabled = true;
            status.textContent = 'Stopped';
            status.className = 'status idle';
            micAnimation.classList.remove('active');
        });

        clearBtn.addEventListener('click', () => {
            finalTranscript = '';
            transcript.innerHTML = '<p style="color: #95a5a6;">Your speech will appear here...</p>';
            document.getElementById('wordCount').textContent = '0';
            document.getElementById('sentenceCount').textContent = '0';
            document.getElementById('sentiment').className = 'sentiment neutral';
            document.getElementById('sentiment').textContent = 'Neutral';
            document.getElementById('entities').innerHTML = '<p style="color: #95a5a6;">No entities detected yet</p>';
            document.getElementById('keywords').innerHTML = '<p style="color: #95a5a6;">No keywords extracted yet</p>';
        });

        languageSelect.addEventListener('change', (e) => {
            if (recognition) recognition.lang = e.target.value;
        });

        function displayTranscript(final, interim) {
            let html = '';
            if (final) html += `<p>${final}</p>`;
            if (interim) html += `<p class="interim">${interim}</p>`;
            transcript.innerHTML = html || '<p style="color: #95a5a6;">Your speech will appear here...</p>';
        }

        function analyzeText(text) {
            if (!text.trim()) return;

            const words = text.trim().split(/\s+/);
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
            
            document.getElementById('wordCount').textContent = words.length;
            document.getElementById('sentenceCount').textContent = sentences.length;

            // Sentiment
            const positiveWords = ['good', 'great', 'excellent', 'amazing', 'wonderful', 'happy', 'love', 'best'];
            const negativeWords = ['bad', 'terrible', 'awful', 'horrible', 'worst', 'hate', 'poor', 'sad'];
            
            const lowerText = text.toLowerCase();
            let positiveCount = 0, negativeCount = 0;

            positiveWords.forEach(word => {
                const matches = lowerText.match(new RegExp(`\\b${word}\\b`, 'g'));
                if (matches) positiveCount += matches.length;
            });

            negativeWords.forEach(word => {
                const matches = lowerText.match(new RegExp(`\\b${word}\\b`, 'g'));
                if (matches) negativeCount += matches.length;
            });

            const sentimentEl = document.getElementById('sentiment');
            if (positiveCount > negativeCount) {
                sentimentEl.className = 'sentiment positive';
                sentimentEl.textContent = `Positive (${positiveCount} positive words)`;
            } else if (negativeCount > positiveCount) {
                sentimentEl.className = 'sentiment negative';
                sentimentEl.textContent = `Negative (${negativeCount} negative words)`;
            } else {
                sentimentEl.className = 'sentiment neutral';
                sentimentEl.textContent = 'Neutral';
            }

            // Entities
            const places = [...new Set(text.match(/\b(New York|London|Paris|Tokyo|Berlin|Sydney)\b/gi) || [])];
            const orgs = [...new Set(text.match(/\b(Google|Apple|Microsoft|Amazon|Facebook|Tesla)\b/gi) || [])];

            let entitiesHtml = '';
            places.forEach(p => entitiesHtml += `<span class="tag place">📍 ${p}</span>`);
            orgs.forEach(o => entitiesHtml += `<span class="tag organization">🏢 ${o}</span>`);
            document.getElementById('entities').innerHTML = entitiesHtml || '<p style="color: #95a5a6;">No entities detected yet</p>';

            // Keywords
            const stopWords = new Set(['the', 'is', 'at', 'which', 'on', 'a', 'an', 'and', 'or', 'but', 'in', 'with', 'to', 'for', 'of']);
            const words2 = text.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(w => w.length > 3 && !stopWords.has(w));

            const wordFreq = {};
            words2.forEach(word => wordFreq[word] = (wordFreq[word] || 0) + 1);

            const sortedWords = Object.entries(wordFreq).sort((a, b) => b[1] - a[1]).slice(0, 10);

            let keywordsHtml = '';
            sortedWords.forEach(([word, count]) => {
                keywordsHtml += `<span class="tag keyword">🔑 ${word} (${count})</span>`;
            });
            document.getElementById('keywords').innerHTML = keywordsHtml || '<p style="color: #95a5a6;">No keywords extracted yet</p>';
        }
    </script>
</body>
</html>
